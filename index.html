<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZAGLOL | المنصة المالية الذكية</title>
  <!-- نظام الخطوط العالمي التفاعلي -->
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- مكتبة الرسوم البيانية المتطورة -->
  <script src="https://jsdelivr.net"></script>
  <!-- مكتبة الأيقونات والرموز التعبيرية الفاخرة -->
  <link rel="stylesheet" href="https://cloudflare.com">
  
  <style>
    :root {
      --bg-main: #060814;
      --bg-card: rgba(15, 23, 42, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --glow-blue: rgba(56, 189, 248, 0.15);
      --text-primary: #f8fafc;
      --text-muted: #94a3b8;
      --c-kwd: #38bdf8;
      --c-egp: #10b981;
      --c-gold: #fbbf24;
      --c-estate: #f43f5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', 'Plus Jakarta Sans', sans-serif; }
    
    body { 
      background: var(--bg-main); 
      color: var(--text-primary); 
      padding: 30px 20px; 
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
    }

    .container { max-width: 1280px; margin: 0 auto; }
    
    /* الهوية البصرية الرئيسية */
    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .zaghlol-title { 
      font-size: 1.8rem; 
      font-weight: 900; 
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }

    /* شريط البورصة والمسطرة العالمية */
    .live-ticker-bar { 
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px; 
      padding: 16px 28px; 
      margin-bottom: 30px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 20px; 
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .gwb-badge { 
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.12) 0%, rgba(99, 102, 241, 0.05) 100%); 
      border: 1px solid rgba(56, 189, 248, 0.3); 
      padding: 10px 22px; 
      border-radius: 16px; 
      display: inline-flex; 
      align-items: center; 
      gap: 12px;
      box-shadow: 0 0 30px var(--glow-blue);
    }
    
    .gwb-badge span { font-weight: 700; color: #e2e8f0; font-size: 0.95rem; }
    .basket-value { font-weight: 900; color: #38bdf8; font-size: 1.3rem; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    .ticker-item { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; color: var(--text-muted); }
    .ticker-item strong { color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; }
    
    /* تصميم البطاقات المتقدم */
    .card { 
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px; 
      padding: 28px; 
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s;
    }
    .card:hover { 
      transform: translateY(-4px); 
      border-color: rgba(56, 189, 248, 0.25);
    }
    
    .grid-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 30px; }
    .grid-dashboard { display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px; }
    
    @media (max-width: 968px) { .grid-dashboard { grid-template-columns: 1fr; } }

    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .card-title i { font-size: 1.3rem; }

    .huge-display { font-size: 2.4rem; font-weight: 900; font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -1px; margin: 10px 0; line-height: 1; }
    .pnl-indicator { font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 12px; }

    /* نماذج وحقول الإدخال والتحكم */
    .field-group { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      padding: 12px 16px; 
      border-radius: 16px;
      margin-bottom: 14px;
      transition: background 0.3s;
    }
    .field-group:focus-within { background: rgba(56, 189, 248, 0.03); border-color: rgba(56, 189, 248, 0.2); }
    .field-group label { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    
    input[type="number"] { 
      background: #111726; 
      border: 1px solid rgba(255,255,255,0.06); 
      padding: 10px 14px; 
      border-radius: 12px; 
      color: #fff; 
      width: 140px; 
      text-align: left; 
      font-weight: 700; 
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
    }
    input[type="number"]:focus { border-color: #38bdf8; outline: none; }

    /* مخرجات الحساب اللحظي الفاخرة */
    .output-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .output-item:last-child { border: none; }
    .output-label { font-size: 0.85rem; color: var(--text-muted); }
    .output-val { font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; }

    button.btn-refresh { 
      background: #111726; 
      border: 1px solid rgba(255,255,255,0.08); 
      padding: 10px 18px; 
      border-radius: 14px; 
      color: var(--text-primary); 
      font-weight: 700; 
      cursor: pointer; 
      transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.9rem;
    }
    button.btn-refresh:hover { background: #38bdf8; color: #000; border-color: #38bdf8; box-shadow: 0 0 20px rgba(56,189,248,0.3); }

    .chart-box { position: relative; height: 210px; width: 100%; margin-top: 15px; }
    .legend-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; margin-top: 20px; }
  </style>
</head>
<body>
<div class="container">
  
  <div class="brand-header">
    <div class="zaghlol-title">⚡ ZAGLOL</div>
    <button id="manualRefreshBtn" class="btn-refresh"><i class="fas fa-rotate"></i> تحديث الأسواق</button>
  </div>

  <!-- شريط البورصة المطور والمحدث لحظياً -->
  <div class="live-ticker-bar">
    <div class="gwb-badge">
      <span><i class="fas fa-layer-group" style="color: #38bdf8;"></i> مسطرة النقد العالمية (GWB):</span>
      <span id="basketValueDisplay" class="basket-value">...</span>
    </div>
    <div class="ticker-item"><span style="color:var(--c-egp)">●</span> سعر صرف الدينار: <strong>1 KWD = <span id="kwdToEgpDisplay">---</span> EGP</strong></div>
    <div class="ticker-item"><span style="color:var(--c-gold)">●</span> الذهب الصافي عيار 24: <strong><span id="goldPerGramKwd">---</span> KWD / جرام</strong></div>

  </div>

    <div class="card">
      <div class="card-title"><i class="fas fa-wallet" style="color: var(--c-egp);"></i> القيمة الاسمية الموحدة</div>
      <div class="huge-display" id="totalWealthDisplay" style="color: #ffffff;">0.000 <span style="font-size:1.2rem; color:var(--text-muted)">KWD</span></div>
      <div id="pnlStatus" class="pnl-indicator">جاري الحساب المالي...</div>
    </div>
    
    <div class="card" style="background: linear-gradient(180deg, rgba(15, 23, 42, 0.8) 0%, rgba(6, 17, 44, 0.9) 100%); border-color: rgba(56, 189, 248, 0.2);">

      <div class="huge-display" id="basketWealthDisplay" style="color: #38bdf8;">0.00 <span style="font-size:1.2rem; color:var(--text-muted)">GWB</span></div>
      <div class="pnl-indicator" style="background:rgba(56,189,248,0.06); color:#38bdf8;">مقياس حقيقي مجرد من تضخم العملات</div>
    </div>
  </div>

  <!-- لوحة التحكم وإدارة المدخرات والمخططات -->
  <div class="grid-dashboard">
    <div class="card">
      <div class="card-title"><i class="fas fa-sliders" style="color: #6366f1;"></i> جرد وإدارة وتوزيع الأصول الحية</div>
      
      <div class="field-group">
        <label><i class="fas fa-money-bill" style="color:var(--c-kwd)"></i> كاش بالدينار الكويتي (KWD)</label>
        <input type="number" id="cashKWD" value="4500.00" step="100">
      </div>
      <div class="field-group">
        <label><i class="fas fa-money-bill-1" style="color:var(--c-egp)"></i> كاش بالجنيه المصري (EGP)</label>
        <input type="number" id="cashEGP" value="380000.00" step="5000">
      </div>
      <div class="field-group">
        <label><i class="fas fa-cube" style="color:var(--c-gold)"></i> غطاء من الذهب الصافي (جرام)</label>
        <input type="number" id="goldGrams" value="110.00" step="5">
      </div>
